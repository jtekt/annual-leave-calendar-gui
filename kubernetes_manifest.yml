apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APPLICATION_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APPLICATION_NAME}
  template:
    metadata:
      labels:
        app: ${APPLICATION_NAME}
    spec:
      containers:
        - name: ${APPLICATION_NAME}
          image: ${CONTAINER_IMAGE_TAGGED}
          # envFrom:
          #   - secretRef:
          #       name: environment-variables
          env:
            - name: VUE_APP_NENKYUU_CALENDAR_API_URL
              value: http://10.115.1.100:30514
            - name: VITE_NENKYUU_CALENDAR_API_URL
              value: http://10.115.1.100:30514
            - name: VITE_GROUP_MANAGER_API_URL
              value: http://10.115.1.100:31999
            - name: VITE_USER_MANAGER_API_URL
              value: http://10.115.1.100:30097
            - name: VITE_LOGIN_URL
              value: http://10.115.1.100:30097/v2/auth/login
            - name: VITE_IDENTIFICATION_URL
              value: http://10.115.1.100:30097/v2/users/self
          resources: {}

---
apiVersion: v1
kind: Service
metadata:
  name: ${APPLICATION_NAME}
spec:
  ports:
    - port: 80
      nodePort: ${K8S_SERVICE_PORT}
  selector:
    app: ${APPLICATION_NAME}
  type: NodePort
