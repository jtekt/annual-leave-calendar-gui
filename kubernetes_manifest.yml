apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APPLICATION_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APPLICATION_NAME}
  template:
    metadata:
      labels:
        app: ${APPLICATION_NAME}
    spec:
      containers:
        - name: ${APPLICATION_NAME}
          image: ${CONTAINER_IMAGE_TAGGED}
          # envFrom:
          #   - secretRef:
          #       name: environment-variables
          env:
            - name: VITE_NENKYUU_CALENDAR_API_URL
              value: https://leaves-api.jtektrnd.net
            - name: VITE_GROUP_MANAGER_API_URL
              value: https://groups-api.jtektrnd.net
            - name: VITE_USER_MANAGER_API_URL
              value: https://employees-api.jtektrnd.net
            - name: VITE_LOGIN_URL
              value: https://employees-api.jtektrnd.net/v3/auth/login
            - name: VITE_IDENTIFICATION_URL
              value: https://employees-api.jtektrnd.net/v3/users/self
          resources: {}

---
---
apiVersion: v1
kind: Service
metadata:
  name: ${APPLICATION_NAME}
spec:
  ports:
    - port: 80
  selector:
    app: ${APPLICATION_NAME}
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${APPLICATION_NAME}
spec:
  rules:
    - host: leaves.jtektrnd.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${APPLICATION_NAME}
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APPLICATION_NAME}-redirection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APPLICATION_NAME}-redirection
  template:
    metadata:
      labels:
        app: ${APPLICATION_NAME}-redirection
    spec:
      containers:
        - name: ${APPLICATION_NAME}-redirection
          image: moreillon/redirection:c8ab3fdf
          env:
            - name: REDIRECTION_TARGET_URL
              value: https://leaves.jtektrnd.net
            - name: REDIRECTION_WARN
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: ${APPLICATION_NAME}-redirection
spec:
  ports:
    - port: 80
      nodePort: 30515
  selector:
    app: ${APPLICATION_NAME}-redirection
  type: NodePort
